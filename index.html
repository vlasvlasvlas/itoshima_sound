<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Itoshima sounds</title>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Roboto', sans-serif;
        }
        body {
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            background-color: black;
            overflow: hidden;
            position: relative;
        }
        #imagen {
            position: absolute;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            object-fit: cover;
            z-index: -1;
        }
        .overlay {
            position: absolute;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            text-align: center;
            color: white;
        }
        #reloj {
            font-size: 3em;
            font-weight: bold;
        }
        #audioButton {
            margin-top: 10px;
            padding: 10px 20px;
            font-size: 1.2em;
            cursor: pointer;
            background-color: rgba(255, 0, 0, 0.1);
            border: none;
            color: white;
            border-radius: 5px;
        }
        #audioButton.on {
            background-color: rgba(0, 255, 0, 0.1);
        }
    </style>
    <script src="https://cdn.jsdelivr.net/npm/yaml@2.8.1/dist/index.min.js"></script>
</head>
<body>
    <img id="imagen" src="img/001.jpg" alt="Imagen Random">
    <div class="overlay">
        <div id="reloj"></div>
        <button id="audioButton">Itoshima Sounds (OFF)</button>
    </div>

    <script>
        const DEFAULT_CONFIG_PATHS = [
            "config/itoshima.config.yaml",
            "config/itoshima.config.json"
        ];

        const DEFAULT_CONFIG = {
            title: "Itoshima sounds",
            timeFormat: "12h",
            imageRotateMs: 900000,
            audioEnabledByDefault: false,
            audio: {
                allowOverlap: false,
                schedule: [],
                manualKeys: {}
            },
            images: {
                files: ["img/001.jpg"]
            }
        };

        const state = {
            audioEnabled: false,
            currentAudio: null,
            config: { ...DEFAULT_CONFIG },
            displayedSecond: null
        };

        const audioButton = document.getElementById("audioButton");
        const imageEl = document.getElementById("imagen");

        function mergeConfig(base, incoming) {
            return {
                ...base,
                ...incoming,
                audio: {
                    ...base.audio,
                    ...(incoming.audio || {})
                },
                images: {
                    ...base.images,
                    ...(incoming.images || {})
                }
            };
        }

        async function tryLoadConfig(path) {
            const response = await fetch(path, { cache: "no-store" });
            if (!response.ok) throw new Error(`Could not load ${path}`);
            const text = await response.text();

            if (path.endsWith(".json")) return JSON.parse(text);
            if (path.endsWith(".yaml") || path.endsWith(".yml")) {
                if (!window.YAML || typeof window.YAML.parse !== "function") {
                    throw new Error("YAML parser not available in browser");
                }
                return window.YAML.parse(text);
            }

            return JSON.parse(text);
        }

        async function loadConfig() {
            const queryPath = new URLSearchParams(window.location.search).get("config");
            const configPaths = queryPath ? [queryPath] : DEFAULT_CONFIG_PATHS;

            for (const path of configPaths) {
                try {
                    const config = await tryLoadConfig(path);
                    return mergeConfig(DEFAULT_CONFIG, config);
                } catch (error) {
                    console.warn(error.message);
                }
            }

            return DEFAULT_CONFIG;
        }

        function setAudioButtonState() {
            audioButton.classList.toggle("on", state.audioEnabled);
            audioButton.textContent = `Itoshima Sounds (${state.audioEnabled ? "ON" : "OFF"})`;
        }

        function stopCurrentAudio(force = false) {
            if (!state.currentAudio) return;
            if (!force && state.config.audio.allowOverlap) return;
            state.currentAudio.pause();
            state.currentAudio.currentTime = 0;
            state.currentAudio = null;
        }

        async function playAudio(audioFile) {
            if (!audioFile) return;
            if (!state.config.audio.allowOverlap) stopCurrentAudio(true);

            const audio = new Audio(audioFile);
            state.currentAudio = audio;
            audio.addEventListener("ended", () => {
                if (state.currentAudio === audio) state.currentAudio = null;
            });

            try {
                await audio.play();
            } catch (error) {
                console.log("Error al reproducir el audio:", error);
            }
        }

        function getCurrentTime24h() {
            const now = new Date();
            const hh = String(now.getHours()).padStart(2, "0");
            const mm = String(now.getMinutes()).padStart(2, "0");
            const ss = String(now.getSeconds()).padStart(2, "0");
            return `${hh}:${mm}:${ss}`;
        }

        function updateClock() {
            const now = new Date();
            const el = document.getElementById("reloj");

            if (state.config.timeFormat === "24h") {
                const hh = String(now.getHours()).padStart(2, "0");
                const mm = String(now.getMinutes()).padStart(2, "0");
                const ss = String(now.getSeconds()).padStart(2, "0");
                el.textContent = `${hh}:${mm}:${ss}`;
                return;
            }

            let hours = now.getHours();
            const minutes = String(now.getMinutes()).padStart(2, "0");
            const seconds = String(now.getSeconds()).padStart(2, "0");
            const ampm = hours >= 12 ? "PM" : "AM";
            hours = hours % 12 || 12;
            const hh = String(hours).padStart(2, "0");
            el.textContent = `${hh}:${minutes}:${seconds} ${ampm}`;
        }

        function checkSchedule() {
            if (!state.audioEnabled) return;

            const currentTime = getCurrentTime24h();
            if (currentTime === state.displayedSecond) return;
            state.displayedSecond = currentTime;

            const match = state.config.audio.schedule.find((event) => event.time === currentTime);
            if (match) playAudio(match.file);
        }

        function rotateImage() {
            const files = state.config.images.files || [];
            if (!files.length) return;
            const next = files[Math.floor(Math.random() * files.length)];
            imageEl.src = next;
        }

        function setupManualKeys() {
            document.addEventListener("keydown", (event) => {
                if (!state.audioEnabled) return;
                const manualFile = state.config.audio.manualKeys?.[event.key];
                if (manualFile) playAudio(manualFile);
            });
        }

        function wireUi() {
            audioButton.addEventListener("click", () => {
                state.audioEnabled = !state.audioEnabled;
                if (!state.audioEnabled) stopCurrentAudio(true);
                setAudioButtonState();
            });
        }

        async function main() {
            state.config = await loadConfig();
            state.audioEnabled = Boolean(state.config.audioEnabledByDefault);
            document.title = state.config.title || "Itoshima sounds";

            wireUi();
            setupManualKeys();
            setAudioButtonState();

            rotateImage();
            updateClock();
            setInterval(updateClock, 1000);
            setInterval(checkSchedule, 1000);
            setInterval(rotateImage, Number(state.config.imageRotateMs) || 900000);
        }

        main();
    </script>
</body>
</html>
